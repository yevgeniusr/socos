version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw.rule=Host(`socos.rachkovan.com`)"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw.entryPoints=http"
      - "traefik.http.services.web-swwcg80gkw4k0k4oco8w8wgw.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.rule=Host(`socos.rachkovan.com`)"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.entryPoints=https"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.tls=true"
    ports:
      - "3000:3000"
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health-check || node -e \"const http=require('http');http.get('http://localhost:3000/api/health-check',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health-check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - PORT=3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw.rule=Host(`socos.rachkovan.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw.entryPoints=http"
      - "traefik.http.services.api-swwcg80gkw4k0k4oco8w8wgw.loadbalancer.server.port=3001"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.rule=Host(`socos.rachkovan.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.entryPoints=https"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.tls=true"
    expose:
      - "3001"
    networks:
      - coolify
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=socos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
