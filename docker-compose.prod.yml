version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw.rule=Host(`socos.rachkovan.com`)"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw.entryPoints=http"
      - "traefik.http.services.web-swwcg80gkw4k0k4oco8w8wgw.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.rule=Host(`socos.rachkovan.com`)"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.entryPoints=https"
      - "traefik.http.routers.web-swwcg80gkw4k0k4oco8w8wgw-https.tls=true"
    ports:
      - "3000:3000"
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health-check || node -e \"const http=require('http');http.get('http://localhost:3000/api/health-check',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health-check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:?MCP_ALLOWED_HOSTS is required}
      - MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS:-https://socos.rachkovan.com}
      - CALENDAR_SYNC_ENABLED=${CALENDAR_SYNC_ENABLED:-false}
      - LOCATION_INGEST_ENABLED=${LOCATION_INGEST_ENABLED:-false}
      - EVENT_DISCOVERY_ENABLED=${EVENT_DISCOVERY_ENABLED:-false}
      - EVENT_BRIEF_ENABLED=${EVENT_BRIEF_ENABLED:-false}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID:?GOOGLE_CALENDAR_CLIENT_ID is required}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET:?GOOGLE_CALENDAR_CLIENT_SECRET is required}
      - GOOGLE_CALENDAR_REDIRECT_URI=https://socos.rachkovan.com/api/integrations/google-calendar/callback
      - GOOGLE_CALENDAR_WEBHOOK_URL=https://socos.rachkovan.com/api/integrations/google-calendar/webhook
      - GOOGLE_CALENDAR_SETTINGS_RESULT_URL=https://socos.rachkovan.com/dashboard/integrations
      - PERSONAL_DATA_KEYS=${PERSONAL_DATA_KEYS:?PERSONAL_DATA_KEYS is required}
      - PERSONAL_DATA_ACTIVE_KEY_VERSION=1
      - PERSONAL_DATA_INDEX_KEY=${PERSONAL_DATA_INDEX_KEY:?PERSONAL_DATA_INDEX_KEY is required}
      - EVENT_SOURCE_ALLOWED_HOSTS=${EVENT_SOURCE_ALLOWED_HOSTS:-}
      - PORT=3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw.rule=Host(`socos.rachkovan.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw.entryPoints=http"
      - "traefik.http.services.api-swwcg80gkw4k0k4oco8w8wgw.loadbalancer.server.port=3001"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw.rule=Host(`socos.rachkovan.com`) && Path(`/api/location/owntracks`)"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw.entryPoints=http"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw.priority=200"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw.service=api-swwcg80gkw4k0k4oco8w8wgw"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw.middlewares=api-owntracks-ratelimit-swwcg80gkw4k0k4oco8w8wgw"
      - "traefik.http.middlewares.api-owntracks-ratelimit-swwcg80gkw4k0k4oco8w8wgw.ratelimit.average=30"
      - "traefik.http.middlewares.api-owntracks-ratelimit-swwcg80gkw4k0k4oco8w8wgw.ratelimit.period=1m"
      - "traefik.http.middlewares.api-owntracks-ratelimit-swwcg80gkw4k0k4oco8w8wgw.ratelimit.burst=10"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.rule=Host(`socos.rachkovan.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.entryPoints=https"
      - "traefik.http.routers.api-swwcg80gkw4k0k4oco8w8wgw-https.tls=true"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.rule=Host(`socos.rachkovan.com`) && Path(`/api/location/owntracks`)"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.entryPoints=https"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.tls=true"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.priority=200"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.service=api-swwcg80gkw4k0k4oco8w8wgw"
      - "traefik.http.routers.api-owntracks-swwcg80gkw4k0k4oco8w8wgw-https.middlewares=api-owntracks-ratelimit-swwcg80gkw4k0k4oco8w8wgw"
    expose:
      - "3001"
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
