name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Workspace Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: socos_migration_test_ci
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d socos_migration_test_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @socos/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type:check

      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgresql://postgres:test-only@127.0.0.1:5432/socos_migration_test_ci

      - name: Build
        run: pnpm build

      - name: Build production web image
        run: docker build -f docker/Dockerfile.web -t socos-web:ci .

      - name: Build production API image
        run: docker build -f services/api/Dockerfile -t socos-api:ci .

      - name: Verify production API runtime tools
        run: docker run --rm --entrypoint sh socos-api:ci -c './node_modules/.bin/prisma --version >/dev/null && test -f ./dist/cli/monica-import.js'

      - name: Verify production API startup and health
        env:
          DATABASE_URL: postgresql://postgres:test-only@127.0.0.1:5432/socos_migration_test_ci
        run: |
          docker run -d --name socos-api-ci --network host \
            -e DATABASE_URL \
            -e JWT_SECRET=synthetic-ci-jwt-secret-at-least-32-characters \
            -e PORT=3001 \
            socos-api:ci
          trap 'docker logs socos-api-ci; docker rm -f socos-api-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3001/api/health-check >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
