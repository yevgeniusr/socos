name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Workspace Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: socos_migration_test_ci
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d socos_migration_test_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @socos/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type:check

      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgresql://postgres:test-only@127.0.0.1:5432/socos_migration_test_ci

      - name: Build
        run: pnpm build
