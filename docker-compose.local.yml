services:
  # Next.js Web App — reverse-proxies /api and /platform
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
      - PLATFORM_INTERNAL_URL=http://platform:8080
    depends_on:
      api:
        condition: service_healthy
      platform:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # NestJS API
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile

    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CALENDAR_SYNC_ENABLED=${CALENDAR_SYNC_ENABLED:-false}
      - LOCATION_INGEST_ENABLED=${LOCATION_INGEST_ENABLED:-false}
      - EVENT_DISCOVERY_ENABLED=${EVENT_DISCOVERY_ENABLED:-false}
      - EVENT_BRIEF_ENABLED=${EVENT_BRIEF_ENABLED:-false}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID:?GOOGLE_CALENDAR_CLIENT_ID synthetic/local value is required}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET:?GOOGLE_CALENDAR_CLIENT_SECRET synthetic/local value is required}
      - GOOGLE_CALENDAR_REDIRECT_URI=${GOOGLE_CALENDAR_REDIRECT_URI:?GOOGLE_CALENDAR_REDIRECT_URI synthetic/local value is required}
      - GOOGLE_CALENDAR_WEBHOOK_URL=${GOOGLE_CALENDAR_WEBHOOK_URL:?GOOGLE_CALENDAR_WEBHOOK_URL synthetic/local value is required}
      - GOOGLE_CALENDAR_SETTINGS_RESULT_URL=${GOOGLE_CALENDAR_SETTINGS_RESULT_URL:?GOOGLE_CALENDAR_SETTINGS_RESULT_URL synthetic/local value is required}
      - PERSONAL_DATA_KEYS=${PERSONAL_DATA_KEYS:?PERSONAL_DATA_KEYS synthetic/local value is required}
      - PERSONAL_DATA_ACTIVE_KEY_VERSION=${PERSONAL_DATA_ACTIVE_KEY_VERSION:?PERSONAL_DATA_ACTIVE_KEY_VERSION synthetic/local value is required}
      - PERSONAL_DATA_INDEX_KEY=${PERSONAL_DATA_INDEX_KEY:?PERSONAL_DATA_INDEX_KEY synthetic/local value is required}
      - EVENT_SOURCE_ALLOWED_HOSTS=${EVENT_SOURCE_ALLOWED_HOSTS:-}
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health-check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    restart: unless-stopped

  # React Platform — static SPA served by nginx
  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-}
    networks:
      - frontend
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-socos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  frontend:
  backend:
